<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Código - Oficial</title>
    <style>
        :root { --p: #4F46E5; --bg: #F3F4F6; --txt: #1F2937; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--txt); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .box { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { font-size: 1.25rem; color: var(--p); text-align: center; margin-bottom: 1.5rem; }
        .field { margin-bottom: 1rem; }
        label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.4rem; opacity: 0.7; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #DDD; border-radius: 0.5rem; outline: none; }
        input:focus { border-color: var(--p); ring: 2px var(--p); }
        button { width: 100%; padding: 1rem; background: var(--p); color: white; border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer; margin-top: 1rem; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Debug Console */
        #log { margin-top: 1rem; font-size: 0.7rem; color: #666; background: #EEE; padding: 10px; border-radius: 5px; display: none; }

        /* Modal */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 10; }
        .card { background: white; padding: 2.5rem; border-radius: 1.5rem; width: 90%; max-width: 400px; text-align: center; }
        .code { font-size: 1.5rem; font-weight: 800; color: var(--p); margin: 1rem 0; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="box">
    <h1>Consulta de Código</h1>
    
    <div id="log">Aguardando carregamento...</div>

    <div class="field">
        <label>PRIMEIRO NOME</label>
        <input type="text" id="nome" placeholder="Ex: Izabella">
    </div>
    <div class="field">
        <label>DATA DE NASCIMENTO</label>
        <input type="date" id="nasc">
    </div>
    
    <button id="btn" onclick="consultar()" disabled>Verificar Código</button>
</div>

<div class="overlay" id="modal">
    <div class="card">
        <div style="font-size: 0.8rem; text-transform: uppercase; opacity: 0.6;">Seu Código é:</div>
        <div class="code" id="resCod"></div>
        <div id="resNome" style="font-weight: 600; margin-bottom: 0.5rem;"></div>
        <div id="resTurma" style="font-size: 0.9rem; opacity: 0.8;"></div>
        <button onclick="document.getElementById('modal').style.display='none'" style="background: #EEE; color: #333; margin-top: 2rem;">Fechar</button>
    </div>
</div>

<script>
    let db = [];
    const log = document.getElementById('log');
    const btn = document.getElementById('btn');

    // Função de LOG para ajudar você a ver o erro no celular/navegador
    function debug(msg, isError = false) {
        log.style.display = 'block';
        log.innerHTML = msg;
        if(isError) log.style.color = 'red';
    }

    window.onload = async () => {
        try {
            // Tenta carregar. Se falhar, tenta com o nome alternativo.
            // O encodeURIComponent lida com o espaço no nome do arquivo automaticamente.
            const fileName = "estudante_info.csv"; 
            debug("Carregando base de dados...");
            
            const resp = await fetch(encodeURIComponent(fileName));
            if (!resp.ok) throw new Error("Não foi possível encontrar o arquivo CSV. Verifique o nome no GitHub.");
            
            const text = await resp.text();
            const lines = text.split(/\r?\n/);
            
            // Pega o cabeçalho e limpa o BOM do Excel
            const headers = lines[0].replace(/^\uFEFF/, '').split(';').map(h => h.trim());
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = lines[i].split(';');
                let obj = {};
                headers.forEach((h, idx) => obj[h] = cols[idx] ? cols[idx].trim() : '');
                db.push(obj);
            }

            debug("Base pronta: " + db.length + " alunos carregados.");
            btn.disabled = false;
        } catch (e) {
            debug("ERRO: " + e.message, true);
        }
    };

    function consultar() {
        const inputNome = document.getElementById('nome').value.trim().toLowerCase();
        const inputData = document.getElementById('nasc').value; // YYYY-MM-DD
        
        if (!inputNome || !inputData) return alert("Preencha os dois campos.");

        // Converte data do input para DD/MM/YYYY
        const [y, m, d] = inputData.split('-');
        const dataBusca = `${d}/${m}/${y}`;

        const aluno = db.find(a => {
            const nomeCSV = a['NOME'] ? a['NOME'].toLowerCase() : '';
            const dataCSV = a['DATA DE NASCIMENTO DO ESTUDANTE'];
            return nomeCSV.startsWith(inputNome) && dataCSV === dataBusca;
        });

        if (aluno) {
            document.getElementById('resCod').innerText = aluno['CODIGO'];
            document.getElementById('resNome').innerText = aluno['NOME'];
            document.getElementById('resTurma').innerText = aluno['TURMA'];
            document.getElementById('modal').style.display = 'flex';
        } else {
            alert("Aluno não encontrado. Confira se o nome está correto e a data de nascimento.");
        }
    }
</script>
</body>
</html>
