<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Acesso ao Questionário</title>
    <style>
        :root { --p: #4F46E5; --s: #10B981; --bg: #F3F4F6; --txt: #1F2937; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--txt); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .box { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 420px; }
        h1 { font-size: 1.4rem; color: var(--p); text-align: center; margin-bottom: 0.5rem; }
        p.desc { font-size: 0.9rem; text-align: center; opacity: 0.7; margin-bottom: 2rem; }
        
        .field { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.4rem; color: var(--p); text-transform: uppercase; }
        input { width: 100%; padding: 0.85rem; border: 2px solid #E5E7EB; border-radius: 0.6rem; outline: none; font-size: 1rem; transition: 0.2s; box-sizing: border-box; }
        input:focus { border-color: var(--p); background: #F9FAFF; }
        
        .btn-main { width: 100%; padding: 1rem; background: var(--p); color: white; border: none; border-radius: 0.6rem; font-weight: 700; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.4); }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        #debug { margin-top: 1.5rem; font-size: 0.75rem; padding: 10px; border-radius: 8px; background: #fdf2f2; color: #991b1b; display: none; border: 1px solid #fecaca; }

        /* Modal / Cartão de Resultado */
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .card { background: white; padding: 2.5rem 2rem; border-radius: 1.5rem; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        
        .result-label { font-size: 0.75rem; font-weight: 800; color: #64748B; text-transform: uppercase; margin-bottom: 0.5rem; margin-top: 1.5rem; }
        .result-value { font-size: 1.1rem; font-weight: 600; color: var(--txt); }
        
        .code-box { background: #F8FAFC; border: 2px dashed #CBD5E1; padding: 1.5rem 1rem; border-radius: 0.8rem; margin: 1rem 0; }
        .code-box strong { font-size: 1.4rem; color: var(--p); letter-spacing: 1px; display: block; word-break: break-all; }
        
        .btn-copy { margin-top: 1rem; width: 100%; padding: 0.75rem; background: #EEF2FF; color: var(--p); border: 1px solid #C7D2FE; border-radius: 0.5rem; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-copy:hover { background: #E0E7FF; }
        .btn-copy.success { background: var(--s); color: white; border-color: var(--s); }

        .btn-link { display: block; text-decoration: none; background: var(--p); color: white; padding: 1rem; border-radius: 0.6rem; font-weight: 700; margin-top: 1.5rem; transition: 0.3s; }
        .btn-link:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.4); }
        
        .btn-close { background: none; border: none; color: #64748B; font-weight: 600; margin-top: 1.5rem; cursor: pointer; text-decoration: underline; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="box">
    <h1>Acesso ao Questionário</h1>
    <p class="desc">Consulte o seu código para realizar o login no Instituto Ayrton Senna.</p>
    
    <div id="debug"></div>

    <div class="field">
        <label>Primeiro Nome do Estudante</label>
        <input type="text" id="nome" placeholder="Ex: Izabella" autocomplete="off">
    </div>
    <div class="field">
        <label>Data de Nascimento</label>
        <input type="date" id="nasc">
    </div>
    
    <button id="btn" class="btn-main" onclick="consultar()" disabled>Consultar Código</button>
</div>

<div class="overlay" id="modal">
    <div class="card">
        <h2 style="margin-top:0; font-size: 1.4rem; color: var(--txt);">Dados Encontrados!</h2>
        
        <p style="font-size: 0.9rem; line-height: 1.5; color: #64748B; margin-bottom: 1.5rem;">
            Copie o código abaixo. Irá precisar dele no campo <strong>Usuário</strong> do site.
        </p>

        <div class="result-label">Nome do Estudante</div>
        <div class="result-value" id="resNome"></div>

        <div class="code-box">
            <strong id="resCod"></strong>
            <button id="btnCopy" class="btn-copy" onclick="copiarCodigo()">
                📋 Copiar Código
            </button>
        </div>

        <div class="result-label">Senha Padrão para Acesso</div>
        <div class="result-value" style="font-size: 1.3rem; letter-spacing: 2px;">123456</div>

        <a href="https://acesso.institutoayrtonsenna.org.br/auth/realms/ias/protocol/openid-connect/auth?client_id=questionary&redirect_uri=https%3A%2F%2Finstrumentocse.org.br%2F&state=b9f636ef-d185-4d62-acd2-ce6986354653&response_mode=fragment&response_type=code&scope=openid&nonce=4cc42e30-6fec-412a-aa5a-4877fc12abb3" 
           target="_blank" class="btn-link">Aceder ao Site do Instituto</a>

        <button class="btn-close" onclick="fecharModal()">Voltar para a pesquisa</button>
    </div>
</div>

<script>
    let db = [];
    // Certifique-se de que o nome aqui corresponde exatamente ao ficheiro no GitHub
    const fileName = "estudante_info.csv";

    window.onload = async () => {
        const debugBox = document.getElementById('debug');
        try {
            const resp = await fetch(encodeURIComponent(fileName));
            if (!resp.ok) throw new Error("Ficheiro CSV não encontrado no servidor.");
            
            const text = await resp.text();
            const lines = text.split(/\r?\n/);
            const headers = lines[0].replace(/^\uFEFF/, '').split(';').map(h => h.trim());
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = lines[i].split(';');
                let obj = {};
                headers.forEach((h, idx) => obj[h] = cols[idx] ? cols[idx].trim() : '');
                db.push(obj);
            }
            document.getElementById('btn').disabled = false;
        } catch (e) {
            debugBox.innerText = "Erro: " + e.message;
            debugBox.style.display = 'block';
        }
    };

    function consultar() {
        const inputNome = document.getElementById('nome').value.trim().toLowerCase();
        const inputData = document.getElementById('nasc').value;
        
        if (!inputNome || !inputData) return alert("Por favor, preencha o nome e a data.");

        const [y, m, d] = inputData.split('-');
        const dataBusca = `${d}/${m}/${y}`;

        const aluno = db.find(a => {
            const nomeCSV = a['NOME'] ? a['NOME'].toLowerCase() : '';
            return nomeCSV.startsWith(inputNome) && a['DATA DE NASCIMENTO DO ESTUDANTE'] === dataBusca;
        });

        if (aluno) {
            document.getElementById('resCod').innerText = aluno['CODIGO'];
            document.getElementById('resNome').innerText = aluno['NOME'];
            document.getElementById('modal').style.display = 'flex';
            
            // Fazer reset ao botão de cópia caso seja uma nova consulta
            const btnCopy = document.getElementById('btnCopy');
            btnCopy.className = 'btn-copy';
            btnCopy.innerHTML = '📋 Copiar Código';
        } else {
            alert("Estudante não encontrado. Verifique os dados e tente novamente.");
        }
    }

    function copiarCodigo() {
        const cod = document.getElementById('resCod').innerText;
        const btnCopy = document.getElementById('btnCopy');
        
        navigator.clipboard.writeText(cod).then(() => {
            btnCopy.className = 'btn-copy success';
            btnCopy.innerHTML = '✅ Código Copiado!';
            
            // Volta ao normal passado 3 segundos
            setTimeout(() => {
                btnCopy.className = 'btn-copy';
                btnCopy.innerHTML = '📋 Copiar Código';
            }, 3000);
        }).catch(err => {
            alert("Não foi possível copiar. Por favor, selecione o texto e copie manualmente.");
        });
    }

    function fecharModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('nome').value = '';
        document.getElementById('nasc').value = '';
    }
</script>
</body>
</html>
